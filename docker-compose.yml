# Nutshell Tier 1: Single-box production deployment
# Mastodon + BlackEnvelope + Caddy reverse proxy

services:
  caddy:
    image: caddy:2.8-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@nutshell.sbs}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - external_network
    depends_on:
      - web
      - streaming
      - black-envelope

  db:
    restart: always
    image: postgres:14-alpine
    shm_size: 256mb
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
    volumes:
      - ./postgres14:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_HOST_AUTH_METHOD=trust'

  redis:
    restart: always
    image: redis:7-alpine
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
    volumes:
      - ./redis:/data

  web:
    build: .
    image: nutshell-web:latest
    restart: always
    env_file: .env.production
    entrypoint: ["/bin/bash", "/opt/mastodon/docker-secrets-entrypoint.sh"]
    command: ["bundle", "exec", "puma", "-C", "config/puma.rb"]
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', "curl -s --noproxy localhost localhost:3000/health | grep -q 'OK' || exit 1"]
    depends_on:
      - db
      - redis
    volumes:
      - ./public/system:/mastodon/public/system
      - ./docker-secrets-entrypoint.sh:/opt/mastodon/docker-secrets-entrypoint.sh:ro
      - ./secrets:/run/secrets:ro

  streaming:
    build:
      dockerfile: ./streaming/Dockerfile
      context: .
    image: nutshell-streaming:latest
    restart: always
    env_file: .env.production
    entrypoint: ["/bin/bash", "/opt/entrypoint-secrets.sh"]
    command: ["node", "./streaming/index.js"]
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', "curl -s --noproxy localhost localhost:4000/api/v1/streaming/health | grep -q 'OK' || exit 1"]
    depends_on:
      - db
      - redis
    volumes:
      - ./docker-secrets-entrypoint.sh:/opt/entrypoint-secrets.sh:ro
      - ./secrets:/run/secrets:ro

  sidekiq:
    image: nutshell-web:latest
    restart: always
    env_file: .env.production
    entrypoint: ["/bin/bash", "/opt/mastodon/docker-secrets-entrypoint.sh"]
    command: ["bundle", "exec", "sidekiq"]
    depends_on:
      - db
      - redis
    networks:
      - external_network
      - internal_network
    volumes:
      - ./public/system:/mastodon/public/system
      - ./docker-secrets-entrypoint.sh:/opt/mastodon/docker-secrets-entrypoint.sh:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ['CMD-SHELL', "ps aux | grep '[s]idekiq\\ 8' || false"]

  black-envelope:
    build:
      context: ../black_envelope/BlackEnvelope
      dockerfile: deployment/e2ee_chat/Dockerfile
    restart: always
    environment:
      CYPHER_CHAT_DB: /data/chat.db
      CYPHER_CHAT_WEB_DIR: /app/web/e2ee_chat
      CYPHER_CHAT_DIRECT_PAYLOAD_MAX_BYTES: ${CYPHER_CHAT_DIRECT_PAYLOAD_MAX_BYTES:-40000000}
      CYPHER_CHAT_GROUP_PAYLOAD_MAX_BYTES: ${CYPHER_CHAT_GROUP_PAYLOAD_MAX_BYTES:-150000000}
      CYPHER_CHAT_STORAGE_LIMIT_BYTES: ${CYPHER_CHAT_STORAGE_LIMIT_BYTES:-524288000}
      CYPHER_CHAT_STORAGE_WARN_BYTES: ${CYPHER_CHAT_STORAGE_WARN_BYTES:-471859200}
      CYPHER_CHAT_TOKEN_SECRET: ${CYPHER_CHAT_TOKEN_SECRET}
      CYPHER_CHAT_NUTSHELL_SSO_SECRET: ${CYPHER_CHAT_NUTSHELL_SSO_SECRET:-}
      CYPHER_CHAT_NUTSHELL_SSO_TTL_SECONDS: ${CYPHER_CHAT_NUTSHELL_SSO_TTL_SECONDS:-300}
      CYPHER_CHAT_NUTSHELL_PUBLIC_URL: ${CYPHER_CHAT_NUTSHELL_PUBLIC_URL:-}
      CYPHER_CHAT_ADMIN_USERNAME: ${CYPHER_CHAT_ADMIN_USERNAME:-}
      CYPHER_CHAT_REGISTRATION_CODE: ${CYPHER_CHAT_REGISTRATION_CODE:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      PASSWORD_RESET_TTL_SECONDS: ${PASSWORD_RESET_TTL_SECONDS:-3600}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@nutshell.sbs}
    volumes:
      - black_envelope_data:/data
    networks:
      - external_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health').read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  external_network:
  internal_network:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  black_envelope_data:
